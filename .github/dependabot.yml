version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait before adopting brand-new releases, so a freshly-compromised
    # action version isn't auto-PR'd the moment it ships (supply-chain
    # hardening; see zizmor `dependabot-cooldown`).
    cooldown:
      default-days: 7
    groups:
      github-owned-actions:
        patterns:
          - "actions/*"
          - "github/*"
    # Third-party actions (e.g. ncipollo/*, NuGet/*) are intentionally
    # left ungrouped so each SHA bump gets its own reviewable PR.
