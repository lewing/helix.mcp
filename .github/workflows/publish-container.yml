name: Publish Container

# Publishes a containerized stdio MCP server image to GHCR alongside the
# existing NuGet publish flow. The image enables consumers whose MCP
# gateway only supports `type: stdio` + `container:` (e.g. GitHub
# Agentic Workflows' MCP Gateway) to attach hlx without a .NET runtime
# in the gateway container.

permissions: {}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (default: 0.0.0-dispatch-<sha>)"
        required: false
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      # NOTE: `persist-credentials: false` removed deliberately. The repo has
      # `.worktrees/*` committed as gitlinks (mode 160000) with no .gitmodules.
      # With persist-credentials disabled, actions/checkout@v6 runs an auth-removal
      # `git submodule foreach` that fatally errors on those gitlinks (exit 128).
      # Mirrors the workaround already applied to ci.yml and zizmor.yml in commit
      # f5bb94c. Proper fix is untracking the accidental .worktrees gitlinks
      # (tracked as a follow-up by upstream).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Two related but distinct concerns:
          #   nuget_version — no `v` prefix; passed as /p:Version= (NuGet rejects 'v0.8.0').
          #   tag_version   — v-prefixed; canonical container tag matching git tag convention.
          # Both tag-push and workflow_dispatch produce the same outputs regardless of whether
          # the caller supplied a `v` prefix.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            RAW="${INPUT_VERSION}"
          else
            RAW="0.0.0-dispatch-${GITHUB_SHA::7}"
          fi
          NUGET_VERSION="${RAW#v}"
          TAG_VERSION="v${NUGET_VERSION}"
          echo "nuget_version=${NUGET_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: nuget=${NUGET_VERSION} tag=${TAG_VERSION}"

      - name: Validate version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          NUGET_VERSION="${{ steps.version.outputs.nuget_version }}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/HelixTool/HelixTool.csproj)
          if [ "$CSPROJ_VERSION" != "$NUGET_VERSION" ]; then
            echo "::error::Version mismatch: nuget=${NUGET_VERSION} csproj=${CSPROJ_VERSION}"
            exit 1
          fi

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/helix.mcp
          tags: |
            type=raw,value=${{ steps.version.outputs.tag_version }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=hlx
            org.opencontainers.image.description=CLI and stdio MCP server for investigating .NET CI failures in Helix and Azure DevOps
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.nuget_version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.nuget_version }}
          provenance: true
          sbom: true
