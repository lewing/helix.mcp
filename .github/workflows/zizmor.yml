name: Zizmor (Actions security)

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".github/dependabot.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".github/dependabot.yml"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Enforce SHA-pinning (unpinned-uses) and other real findings, but
          # don't fail CI on informational notes or low-confidence findings
          # (e.g. artipacked). Accepted exceptions live in .github/zizmor.yml.
          min-severity: low
          min-confidence: medium
          # Avoid requiring GitHub Advanced Security / code-scanning upload.
          advanced-security: false
          config: .github/zizmor.yml
          online-audits: "false"
