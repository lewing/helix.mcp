name: Zizmor (Actions security)

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".github/dependabot.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".github/dependabot.yml"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Enforce SHA-pinning (unpinned-uses) and other real findings, but
          # don't fail CI on informational notes or low-confidence findings
          # (e.g. artipacked). Accepted exceptions live in .github/zizmor.yml.
          min-severity: low
          min-confidence: medium
          # Avoid requiring GitHub Advanced Security / code-scanning upload.
          advanced-security: false
          config: .github/zizmor.yml
          online-audits: "false"
